name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push nginx
      run: |
        docker build -t sebastian1219/nginx:latest ./docker/nginx
        docker push sebastian1219/nginx:latest

    - name: Build and Push app-ramos
      run: |
        docker build -t sebastian1219/app-ramos:latest ./docker/app-ramos
        docker push sebastian1219/app-ramos:latest

    - name: Build and Push apache
      run: |
        docker build -t sebastian1219/apache:latest ./docker/apache
        docker push sebastian1219/apache:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure kubectl
      run: |
        aws eks update-kubeconfig --region us-east-1 --name cluster-sebastian-vargas

    - name: Deploy nginx
      run: kubectl apply -f k8s/nginx/

    - name: Deploy app-ramos
      run: kubectl apply -f k8s/app-ramos/

    - name: Deploy apache
      run: kubectl apply -f k8s/apache/
