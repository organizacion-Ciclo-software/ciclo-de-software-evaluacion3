name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push nginx
      run: |
        docker build -t sebastianvargas/nginx:latest -f docker/nginx/Dockerfile .
        docker push sebastianvargas/nginx:latest

    - name: Build and Push app-ramos
      run: |
        docker build -t sebastianvargas/app-ramos:latest -f docker/app-ramos/Dockerfile .
        docker push sebastianvargas/app-ramos:latest

    - name: Build and Push apache
      run: |
        docker build -t sebastianvargas/apache:latest -f docker/apache/Dockerfile .
        docker push sebastianvargas/apache:latest

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Configure kubectl
      run: |
        aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name cluster-sebastian-vargas
        kubectl get nodes


  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Configure kubectl
      run: |
        aws eks update-kubeconfig --region us-east-1 --name cluster-sebastian-vargas

    - name: Deploy nginx
      id: deploy-nginx
      run: |
        kubectl apply -f k8s/nginx/
        kubectl rollout status deployment/nginx --timeout=60s

    - name: Rollback nginx
      if: failure()
      run: |
        kubectl rollout undo deployment/nginx
        kubectl rollout status deployment/nginx --timeout=60s

    - name: Deploy app-ramos
      id: deploy-app
      run: |
        kubectl apply -f k8s/app-ramos/
        kubectl rollout status deployment/app-ramos --timeout=60s

    - name: Rollback app-ramos
      if: failure()
      run: |
        kubectl rollout undo deployment/app-ramos
        kubectl rollout status deployment/app-ramos --timeout=60s

    - name: Deploy apache
      id: deploy-apache
      run: |
        kubectl apply -f k8s/apache/
        kubectl rollout status deployment/apache --timeout=60s

    - name: Rollback apache
      if: failure()
      run: |
        kubectl rollout undo deployment/apache
        kubectl rollout status deployment/apache --timeout=60s

