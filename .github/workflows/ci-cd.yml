name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push nginx
      run: |
        docker build -t sebastianvargas/nginx:latest -f docker/nginx/Dockerfile .
        docker push sebastian1219/nginx:latest

    - name: Build and Push app-ramos
      run: |
        docker build -t sebastianvargas/app-ramos:latest -f docker/app-ramos/Dockerfile .
        docker push sebastian1219/app-ramos:latest

    - name: Build and Push apache
      run: |
        docker build -t sebastianvargas/apache:latest -f docker/apache/Dockerfile .
        docker push sebastian1219/apache:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure kubectl
      run: |
        aws eks update-kubeconfig --region us-east-1 --name cluster-sebastian-vargas

    - name: Deploy nginx
      run: kubectl apply -f k8s/nginx/

    - name: Deploy app-ramos
      run: kubectl apply -f k8s/app-ramos/

    - name: Deploy apache
      run: kubectl apply -f k8s/apache/

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Configure kubectl
      run: |
        aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name cluster-sebastian-vargas
