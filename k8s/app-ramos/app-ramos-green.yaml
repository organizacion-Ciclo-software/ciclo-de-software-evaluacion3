apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-ramos-green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-ramos
      color: green
  template:
    metadata:
      labels:
        app: app-ramos
        color: green
    spec:
      containers:
      - name: app-ramos
        image: sebastianvargas/app-ramos:v2
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
