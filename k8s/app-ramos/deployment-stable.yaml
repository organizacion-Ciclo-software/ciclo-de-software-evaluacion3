apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-ramos-stable
  labels:
    app: app-ramos
    track: stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: app-ramos
      track: stable
  template:
    metadata:
      labels:
        app: app-ramos
        track: stable
    spec:
      containers:
      - name: app-ramos
        image: sebastianvargas/app-ramos:latest
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
